name: Unify Aurora Names

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/unify-aurora-names.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Apply official Chinese and English names
        run: python scripts/unify_aurora_names.py
      - name: Commit only the webpage name changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add aurora.html
          git rm scripts/unify_aurora_names.py
          git commit -m "Unify Aurora Chinese and English product names"
          git push
